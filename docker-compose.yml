services:
  model-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: yolo-model-api
    expose:
      - "5000"
    env_file:
      - .env
    volumes:
      - ./model:/app/model:ro
    restart: unless-stopped

  tg-bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: yolo-tg-bot
    env_file:
      - .env
    environment:
      - MODEL_API_URL=http://model-api:5000
    depends_on:
      - model-api
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: fruitdet-caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - model-api
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
